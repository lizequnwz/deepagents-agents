[server]
headless = true

[browser]
gatherUsageStats = false

[theme]
font = "sans-serif"
headingFont = "sans-serif"
codeFont = "monospace"
baseFontSize = 16
codeFontSize = "0.875rem"
baseRadius = "medium"
buttonRadius = "medium"
showWidgetBorder = true
showSidebarBorder = true
headingFontSizes = ["2rem", "1.5rem", "1.25rem", "1rem", "0.875rem", "0.75rem"]
headingFontWeights = [700, 650, 600, 600, 600, 600]

[theme.light]
primaryColor = "#3730A3"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#172033"
linkColor = "#3730A3"
codeTextColor = "#172033"
codeBackgroundColor = "#F1F5F9"
borderColor = "#CBD5E1"
dataframeBorderColor = "#CBD5E1"
dataframeHeaderBackgroundColor = "#F1F5F9"
blueColor = "#1D4ED8"
greenColor = "#15803D"
orangeColor = "#B45309"
redColor = "#B91C1C"
grayColor = "#475569"

[theme.light.sidebar]
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#172033"
borderColor = "#CBD5E1"
primaryColor = "#3730A3"

[theme.dark]
primaryColor = "#4338CA"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#172033"
textColor = "#F1F5F9"
linkColor = "#C7D2FE"
codeTextColor = "#E2E8F0"
codeBackgroundColor = "#111827"
borderColor = "#475569"
dataframeBorderColor = "#475569"
dataframeHeaderBackgroundColor = "#1E293B"
blueColor = "#93C5FD"
greenColor = "#86EFAC"
orangeColor = "#FCD34D"
redColor = "#FCA5A5"
grayColor = "#CBD5E1"

[theme.dark.sidebar]
backgroundColor = "#111827"
secondaryBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
borderColor = "#475569"
primaryColor = "#4338CA"
